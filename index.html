<style>
:root {
  --brown:       #6b4226;
  --brown-mid:   #8a5a38;
  --brown-light: #b8835a;
  --brown-pale:  #d4a97a;
  --brown-dim:   rgba(107,66,38,0.08);
  --brown-border:rgba(107,66,38,0.18);
  --brown-border2:rgba(107,66,38,0.35);
  --bg-page:     #faf7f4;
  --bg2:         #ffffff;
  --surface:     #f5f0eb;
  --surface2:    #ede5da;
  --surface3:    #e3d5c5;
  --text:        #2a1f16;
  --text2:       #6b5a4a;
  --text3:       #a8937e;
  --border:      rgba(107,66,38,0.13);
  --border2:     rgba(107,66,38,0.28);
  --green:       #4a8c5c;
  --red:         #c0392b;
  --radius:      12px;
  --radius-sm:   9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{font-family:'DM Sans',sans-serif;background:var(--bg-page);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
.header{
  background:var(--brown);
  padding:34px 20px 24px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,255,255,0.06) 0%, transparent 70%);
  pointer-events:none;
}
.header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(20px,5vw,34px);
  font-weight:600;color:#fff;
  letter-spacing:3px;margin-bottom:6px;
}
.header-sub{font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:2px;text-transform:uppercase;font-weight:400;}
.header-line{width:36px;height:1.5px;background:rgba(255,255,255,0.3);margin:12px auto 0;border-radius:2px;}

/* ── STICKY TOP ── */
.sticky-top{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 1px 12px rgba(107,66,38,0.07);}

/* ── SEARCH ── */
.search-wrap{padding:12px 16px;position:relative;}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}
.search-box{
  width:100%;background:var(--surface);
  border:1.5px solid var(--border);border-radius:24px;
  padding:10px 36px 10px 40px;
  color:var(--text);font-size:13px;
  font-family:'DM Sans',sans-serif;outline:none;
  transition:border 0.2s,background 0.2s;
}
.search-box::placeholder{color:var(--text3);}
.search-box:focus{border-color:var(--brown-mid);background:#fff;}
.search-clear{
  position:absolute;right:28px;top:50%;transform:translateY(-50%);
  background:var(--surface3);border:none;color:var(--text2);
  width:20px;height:20px;border-radius:50%;font-size:11px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
}

/* ── NAV ── */
.nav-scroll{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
.nav-scroll::-webkit-scrollbar{display:none;}
.nav-btn{
  flex-shrink:0;padding:7px 15px;
  border-radius:20px;border:1.5px solid var(--border);
  background:transparent;color:var(--text2);
  font-size:11px;font-weight:500;letter-spacing:0.5px;
  text-transform:uppercase;cursor:pointer;
  transition:all 0.2s;font-family:'DM Sans',sans-serif;
  white-space:nowrap;display:flex;align-items:center;gap:5px;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn:hover{border-color:var(--brown-mid);color:var(--brown);}
.nav-btn.active{background:var(--brown);border-color:var(--brown);color:#fff;font-weight:600;}
.nav-btn .n-emoji{font-size:13px;line-height:1;}

/* Favorites nav badge */
.fav-badge{
  background:#e74c3c;color:#fff;
  font-size:9px;font-weight:700;
  border-radius:50%;width:16px;height:16px;
  display:inline-flex;align-items:center;justify-content:center;
  margin-left:2px;line-height:1;
}

/* ── CONTENT ── */
.content{padding:0 0 60px;}

/* ── SECTION HEAD ── */
.section-head{padding:22px 18px 4px;display:flex;align-items:baseline;gap:10px;}
.section-head h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--brown);}
.section-head .item-count{font-size:11px;color:var(--text3);letter-spacing:0.5px;}

/* ── SUBSECTION LABEL ── */
.subsec-label{
  font-size:9.5px;font-weight:500;letter-spacing:1.8px;
  text-transform:uppercase;color:var(--text3);
  padding:14px 18px 8px;
  display:flex;align-items:center;gap:10px;
}
.subsec-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── ITEMS ── */
.items-list{padding:0 12px;display:flex;flex-direction:column;gap:3px;}
.item-card{
  background:#fff;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:13px 15px;
  cursor:pointer;transition:all 0.15s;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.item-card::after{
  content:'';position:absolute;
  left:0;top:12%;bottom:12%;width:3px;
  background:transparent;border-radius:0 2px 2px 0;
  transition:background 0.15s;
}
.item-card:hover{border-color:var(--border2);background:var(--surface);}
.item-card.expanded{border-color:var(--brown-border2);background:var(--surface);}
.item-card.expanded::after{background:var(--brown);}
.item-row{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.item-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.veg-dot{width:11px;height:11px;flex-shrink:0;border:1.5px solid var(--green);border-radius:2px;position:relative;}
.veg-dot::after{content:'';position:absolute;top:1.5px;left:1.5px;width:5px;height:5px;background:var(--green);border-radius:50%;}
.item-name{font-size:13.5px;font-weight:400;color:var(--text);line-height:1.3;}
.item-right{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.item-price{font-size:14px;font-weight:600;color:var(--brown);}
.chevron{color:var(--text3);font-size:9px;transition:transform 0.25s;display:inline-block;}
.item-card.expanded .chevron{transform:rotate(180deg);}
.item-desc{
  font-size:12.5px;color:var(--text2);line-height:1.65;
  margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border);
  display:none;animation:fd 0.2s ease;
}
.item-card.expanded .item-desc{display:block;}
@keyframes fd{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.addon-pill{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:8px;font-size:11px;color:var(--brown);
  background:var(--brown-dim);border:1px solid var(--brown-border);
  border-radius:20px;padding:3px 10px;font-weight:500;
}

/* ── FAV HEART BUTTON ── */
.fav-icon{
  font-size:15px;
  cursor:pointer;
  flex-shrink:0;
  transition:transform 0.2s, color 0.2s;
  color:var(--text3);
  line-height:1;
  -webkit-tap-highlight-color:transparent;
  z-index:2;
}
.fav-icon:hover{transform:scale(1.2);}
.fav-icon.faved{color:#e74c3c;animation:heartPop 0.3s ease;}
@keyframes heartPop{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

/* ── FAVORITES SECTION ── */
.fav-section{
  background:linear-gradient(135deg, rgba(231,76,60,0.04) 0%, rgba(107,66,38,0.04) 100%);
  border:1.5px solid rgba(231,76,60,0.15);
  border-radius:var(--radius);
  margin:16px 12px 0;
  padding-bottom:6px;
  overflow:hidden;
}
.fav-section-head{
  padding:14px 16px 8px;
  display:flex;align-items:center;justify-content:space-between;
}
.fav-section-head h2{
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:600;
  color:#c0392b;
  display:flex;align-items:center;gap:8px;
}
.fav-section-head .item-count{font-size:11px;color:var(--text3);}
.fav-clear-btn{
  font-size:10px;color:var(--text3);
  background:none;border:1px solid var(--border);
  border-radius:12px;padding:3px 10px;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:0.5px;
  transition:all 0.2s;
}
.fav-clear-btn:hover{border-color:#e74c3c;color:#e74c3c;}
.fav-empty{
  padding:20px;text-align:center;
  color:var(--text3);font-size:13px;line-height:1.8;
}
.fav-empty span{font-size:26px;display:block;margin-bottom:6px;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--brown);color:#fff;
  font-size:12.5px;font-weight:500;
  padding:10px 20px;border-radius:24px;
  box-shadow:0 4px 20px rgba(107,66,38,0.3);
  z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.red{background:#c0392b;}

/* ── SEARCH RESULTS ── */
.search-result-header{padding:14px 18px 4px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:500;}
.search-result-category{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--brown);opacity:0.8;padding:12px 18px 6px;}
.no-results{padding:50px 20px;text-align:center;color:var(--text3);font-size:13px;line-height:1.8;}
.no-results span{font-size:28px;display:block;margin-bottom:10px;}
mark{background:rgba(107,66,38,0.12);color:var(--brown);border-radius:3px;padding:0 2px;}

/* ── GAPS ── */
.gap{height:14px;}
.gap-lg{height:20px;}

/* ── FOOTER ── */
footer{
  text-align:center;padding:28px 20px;
  border-top:1px solid var(--border);
  font-size:12px;color:var(--text3);font-weight:300;
  background:#fff;
}
footer strong{color:var(--brown);font-weight:500;}

/* ── MOBILE ── */
.swipe-hint{
  font-size:11px;font-weight:500;letter-spacing:0.4px;
  text-align:center;padding:6px 16px 4px;display:none;
  color:var(--brown);
  background:linear-gradient(90deg,transparent,rgba(107,66,38,0.07),transparent);
  border-top:1px solid var(--border);
  animation:swipePulse 2.5s ease-in-out infinite;
}
.swipe-hint::before{content:'⟵ ';}
.swipe-hint::after{content:' ⟶';}
@keyframes swipePulse{
  0%,100%{opacity:0.6;}
  50%{opacity:1;}
}
@media(max-width:600px){
  .swipe-hint{display:block;}
  .item-name{font-size:13px;}
}
@media(max-width:400px){
  .header h1{letter-spacing:1px;}
  .items-list{padding:0 8px;}
  .item-card{padding:12px 12px;}
}

.best-icon{
  margin-left:8px;font-size:10px;font-weight:600;
  color:#6b4226;background:rgba(107,66,38,0.08);
  padding:2px 6px;border-radius:10px;
}
.must-icon{
  margin-left:8px;font-size:11px;font-weight:600;
  color:#c2410c;background:rgba(194,65,12,0.08);
  padding:2px 6px;border-radius:10px;letter-spacing:0.3px;
}
</style>

let currentSection = 'coffee';
let searchQuery = '';
let expanded = new Set();

/* ── FAVORITES (localStorage) ── */
function getFavs() {
  try { return JSON.parse(localStorage.getItem('kava_favs') || '[]'); }
  catch(e) { return []; }
}
function saveFavs(arr) {
  localStorage.setItem('kava_favs', JSON.stringify(arr));
}
function isFaved(name) {
  return getFavs().some(f => f.name === name);
}
function toggleFav(e, itemName, itemPrice, itemDesc, itemTag, itemAddon) {
  e.stopPropagation();
  let favs = getFavs();
  const idx = favs.findIndex(f => f.name === itemName);
  if (idx >= 0) {
    favs.splice(idx, 1);
    saveFavs(favs);
    showToast('Removed from favourites', true);
  } else {
    favs.push({ name: itemName, price: itemPrice, desc: itemDesc, tag: itemTag || '', addon: itemAddon || '' });
    saveFavs(favs);
    showToast('❤️ Added to favourites!');
  }
  // Update all heart icons for this item across the page
  document.querySelectorAll(`.fav-icon[data-name="${CSS.escape(itemName)}"]`).forEach(el => {
    el.classList.toggle('faved', isFaved(itemName));
    el.textContent = isFaved(itemName) ? '❤️' : '♡';
  });
  // Update nav badge
  updateFavBadge();
  // Re-render favorites section if on favorites tab
  if (currentSection === 'favorites') render();
}
function clearAllFavs() {
  saveFavs([]);
  updateFavBadge();
  render();
  showToast('Favourites cleared');
}
function updateFavBadge() {
  const count = getFavs().length;
  const badge = document.getElementById('fav-badge');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'inline-flex' : 'none';
  }
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg, isRed) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isRed ? ' red' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2200);
}

/* ── NAV ── */
function buildNav() {
  const favCount = getFavs().length;
  const favBtn = `<button class="nav-btn${currentSection==='favorites'?' active':''}" onclick="setSection('favorites')">
    <span class="n-emoji">❤️</span>Favourites
    <span class="fav-badge" id="fav-badge" style="display:${favCount>0?'inline-flex':'none'}">${favCount}</span>
  </button>`;
  document.getElementById('navScroll').innerHTML =
    Object.entries(MENU).map(([k,v]) =>
      `<button class="nav-btn${k===currentSection?' active':''}" onclick="setSection('${k}')"><span class="n-emoji">${v.emoji}</span>${v.label}</button>`
    ).join('') + favBtn;
}

function setSection(key) {
  currentSection = key;
  if (searchQuery) { clearSearch(); return; }
  expanded = new Set();
  buildNav();
  render();
  window.scrollTo({ top: document.querySelector('.sticky-top').offsetHeight, behavior:'smooth' });
}

function handleSearch(val) {
  searchQuery = val.toLowerCase().trim();
  document.getElementById('clearBtn').style.display = searchQuery ? 'flex' : 'none';
  expanded = new Set();
  render();
}
function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  expanded = new Set();
  render();
}
function toggle(id) {
  expanded.has(id) ? expanded.delete(id) : expanded.add(id);
  const card = document.getElementById(id);
  if (!card) return;
  card.classList.toggle('expanded', expanded.has(id));
}
function hl(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>');
}

function itemHTML(item, id) {
  const isExp = expanded.has(id);
  const q = searchQuery;
  const faved = isFaved(item.name);
  return `<div class="item-card${isExp?' expanded':''}" id="${id}" onclick="toggle('${id}')">
    <div class="item-row">
      <div class="item-left">
        <span class="veg-dot"></span>
        <span class="fav-icon${faved?' faved':''}" data-name="${item.name.replace(/"/g,'&quot;')}"
          onclick="toggleFav(event,'${item.name.replace(/'/g,"\\'")}',${item.price},'${(item.desc||'').replace(/'/g,"\\'")}','${item.tag||''}','${(item.addon||'').replace(/'/g,"\\'")}')"
        >${faved?'❤️':'♡'}</span>
        <span class="item-name">
          ${hl(item.name,q)}
          ${item.tag==='bestseller'?'<span class="best-icon">⭐ Bestseller</span>':''}
          ${item.tag==='musttry'?'<span class="must-icon">🔥 MustTry</span>':''}
        </span>
      </div>
      <div class="item-right"><span class="item-price">₹${item.price}</span><span class="chevron">▾</span></div>
    </div>
    <div class="item-desc">
      ${hl(item.desc,q)}
      ${item.addon?`<div class="addon-pill">✦ ${item.addon}</div>`:''}
    </div>
  </div>`;
}

/* ── RENDER ── */
function render() {
  const c = document.getElementById('content');

  // FAVORITES SECTION
  if (currentSection === 'favorites' && !searchQuery) {
    const favs = getFavs();
    if (!favs.length) {
      c.innerHTML = `
        <div class="gap-lg"></div>
        <div class="fav-section" style="margin:16px 12px;">
          <div class="fav-section-head">
            <h2>❤️ Your Favourites</h2>
          </div>
          <div class="fav-empty">
            <span>🫶</span>
            Tap ♡ on any item to save it here.<br>
            <small style="color:var(--text3)">Your wishlist lives across visits!</small>
          </div>
        </div>`;
      return;
    }
    let html = `<div class="gap-lg"></div>
      <div class="fav-section">
        <div class="fav-section-head">
          <h2>❤️ Your Favourites</h2>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="item-count">${favs.length} item${favs.length!==1?'s':''}</span>
            <button class="fav-clear-btn" onclick="clearAllFavs()">Clear all</button>
          </div>
        </div>
        <div class="items-list" style="padding:0 10px;">
          ${favs.map((item,i) => itemHTML(item, `fav-${i}`)).join('')}
        </div>
        <div class="gap"></div>
      </div>`;
    c.innerHTML = html;
    return;
  }

  // SEARCH
  if (searchQuery) {
    let html = `<div class="search-result-header">Results for "${searchQuery}"</div>`;
    let found = 0;
    Object.entries(MENU).forEach(([sk,sv]) => {
      let secItems = '';
      Object.entries(sv.subsections).forEach(([sub,items]) => {
        items.forEach((item,i) => {
          if (item.name.toLowerCase().includes(searchQuery) || item.desc.toLowerCase().includes(searchQuery)) {
            const id = `s-${sk}-${i}-${sub.replace(/\W/g,'')}`;
            secItems += itemHTML(item, id);
            found++;
          }
        });
      });
      if (secItems) {
        html += `<div class="search-result-category">${sv.emoji} ${sv.label}</div><div class="items-list">${secItems}</div><div class="gap"></div>`;
      }
    });
    if (!found) html = `<div class="no-results"><span>🔍</span>Nothing found for "<strong>${searchQuery}</strong>"<br><small style="color:var(--text3)">Try a different keyword</small></div>`;
    c.innerHTML = html;
    return;
  }

  // NORMAL SECTION
  const sec = MENU[currentSection];
  const total = Object.values(sec.subsections).reduce((a,b) => a+b.length, 0);
  let html = `<div class="gap-lg"></div><div class="section-head"><h2>${sec.emoji} ${sec.label}</h2><span class="item-count">${total} items</span></div>`;
  const subs = Object.entries(sec.subsections);
  subs.forEach(([sub,items]) => {
    if (subs.length > 1) html += `<div class="subsec-label">${sub}</div>`;
    html += `<div class="items-list">`;
    items.forEach((item,i) => {
      const id = `${currentSection}-${sub.replace(/\W/g,'')}-${i}`;
      html += itemHTML(item, id);
    });
    html += `</div><div class="gap"></div>`;
  });
  c.innerHTML = html;
}

buildNav();
render();
</script>
