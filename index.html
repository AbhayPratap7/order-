<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Kava The Caffeine House | Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --brown:       #6b4226;
  --brown-mid:   #8a5a38;
  --brown-light: #b8835a;
  --brown-pale:  #d4a97a;
  --brown-dim:   rgba(107,66,38,0.08);
  --brown-border:rgba(107,66,38,0.18);
  --brown-border2:rgba(107,66,38,0.35);
  --bg-page:     #faf7f4;
  --bg2:         #ffffff;
  --surface:     #f5f0eb;
  --surface2:    #ede5da;
  --surface3:    #e3d5c5;
  --text:        #2a1f16;
  --text2:       #6b5a4a;
  --text3:       #a8937e;
  --border:      rgba(107,66,38,0.13);
  --border2:     rgba(107,66,38,0.28);
  --green:       #4a8c5c;
  --red:         #c0392b;
  --radius:      12px;
  --radius-sm:   9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{font-family:'DM Sans',sans-serif;background:var(--bg-page);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;z-index:9999;background:var(--brown);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transition:opacity 0.7s ease,visibility 0.7s ease;}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.splash-steam{display:flex;gap:8px;margin-bottom:10px;height:32px;align-items:flex-end;}
.steam-line{width:3px;border-radius:2px;background:rgba(255,255,255,0.25);transform-origin:bottom center;animation:steamRise 1.6s ease-in-out infinite;}
.steam-line:nth-child(1){height:18px;animation-delay:0s;}
.steam-line:nth-child(2){height:26px;animation-delay:0.25s;}
.steam-line:nth-child(3){height:14px;animation-delay:0.5s;}
@keyframes steamRise{0%,100%{opacity:0.15;transform:scaleY(0.7) translateY(4px);}50%{opacity:0.5;transform:scaleY(1) translateY(-4px);}}
.splash-cup{font-size:52px;line-height:1;margin-bottom:22px;animation:cupPulse 2s ease-in-out infinite;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.25));}
@keyframes cupPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
.splash-greeting{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:10px;animation:fadeInUp 0.6s ease both;animation-delay:0.1s;}
.splash-title{font-family:'Playfair Display',serif;font-size:clamp(26px,7vw,42px);font-weight:600;color:#fff;letter-spacing:2px;text-align:center;line-height:1.15;margin-bottom:6px;animation:fadeInUp 0.6s ease both;animation-delay:0.2s;}
.splash-line{width:40px;height:1.5px;background:rgba(255,255,255,0.3);border-radius:2px;margin:14px auto 14px;animation:fadeInUp 0.6s ease both;animation-delay:0.3s;}
.splash-sub{font-family:'Playfair Display',serif;font-size:clamp(14px,3.5vw,18px);font-style:italic;color:rgba(255,255,255,0.75);letter-spacing:0.5px;text-align:center;animation:fadeInUp 0.6s ease both;animation-delay:0.4s;}
.splash-dots{display:flex;gap:7px;margin-top:44px;animation:fadeInUp 0.6s ease both;animation-delay:0.6s;}
.splash-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);animation:dotBounce 1.2s ease-in-out infinite;}
.splash-dot:nth-child(1){animation-delay:0s;}
.splash-dot:nth-child(2){animation-delay:0.2s;}
.splash-dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.7);background:rgba(255,255,255,0.25);}40%{transform:scale(1.15);background:rgba(255,255,255,0.7);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ── HEADER ── */
.header{background:var(--brown);padding:34px 20px 24px;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(255,255,255,0.06) 0%,transparent 70%);pointer-events:none;}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,34px);font-weight:600;color:#fff;letter-spacing:3px;margin-bottom:6px;}
.header-sub{font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:2px;text-transform:uppercase;font-weight:400;}
.header-line{width:36px;height:1.5px;background:rgba(255,255,255,0.3);margin:12px auto 0;border-radius:2px;}

/* ── STICKY TOP ── */
.sticky-top{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 1px 12px rgba(107,66,38,0.07);}

/* ── SEARCH ── */
.search-wrap{padding:12px 16px;position:relative;}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}
.search-box{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:24px;padding:10px 36px 10px 40px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s,background 0.2s;}
.search-box::placeholder{color:var(--text3);}
.search-box:focus{border-color:var(--brown-mid);background:#fff;}
.search-clear{position:absolute;right:28px;top:50%;transform:translateY(-50%);background:var(--surface3);border:none;color:var(--text2);width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;}

/* ── NAV ── */
.nav-scroll{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
.nav-scroll::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:7px 15px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;}
.nav-btn:hover{border-color:var(--brown-mid);color:var(--brown);}
.nav-btn.active{background:var(--brown);border-color:var(--brown);color:#fff;font-weight:600;}
.nav-btn .n-emoji{font-size:13px;line-height:1;}
.nav-btn.fav-nav-btn{border-color:rgba(231,76,60,0.3);color:#c0392b;background:rgba(231,76,60,0.05);}
.nav-btn.fav-nav-btn:hover{border-color:#e74c3c;background:rgba(231,76,60,0.1);}
.nav-btn.fav-nav-btn.active{background:#c0392b;border-color:#c0392b;color:#fff;}
.fav-badge{background:#e74c3c;color:#fff;font-size:9px;font-weight:700;border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;line-height:1;}
.member-nav-btn{flex-shrink:0;padding:7px 15px;border-radius:20px;border:1.5px solid rgba(107,66,38,0.4);background:rgba(107,66,38,0.06);color:var(--brown);font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;}
.member-nav-btn:hover{background:var(--brown);color:#fff;border-color:var(--brown);}
.member-nav-btn.active-member{background:var(--brown);border-color:var(--brown);color:#fff;}

/* ── FAV BANNER ── */
.fav-quick-banner{margin:10px 12px 0;background:linear-gradient(135deg,#fff5f5 0%,#fff9f5 100%);border:1.5px solid rgba(231,76,60,0.2);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.fav-quick-banner:hover{border-color:rgba(231,76,60,0.4);background:linear-gradient(135deg,#ffeeee 0%,#fff5ef 100%);}
.fav-quick-banner-left{display:flex;align-items:center;gap:12px;}
.fav-quick-banner-icon{width:40px;height:40px;border-radius:50%;background:rgba(231,76,60,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.fav-quick-banner-text h3{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:#c0392b;margin-bottom:2px;}
.fav-quick-banner-text p{font-size:11.5px;color:var(--text3);font-weight:400;}
.fav-quick-banner-text p strong{color:var(--brown);font-weight:600;}
.fav-quick-banner-arrow{color:rgba(192,57,43,0.5);font-size:18px;flex-shrink:0;}

/* ── CONTENT ── */
.content{padding:0 0 100px;}

/* ── SECTION HEAD ── */
.section-head{padding:22px 18px 4px;display:flex;align-items:baseline;gap:10px;}
.section-head h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--brown);}
.section-head .item-count{font-size:11px;color:var(--text3);letter-spacing:0.5px;}

/* ── SUBSECTION LABEL ── */
.subsec-label{font-size:9.5px;font-weight:500;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);padding:14px 18px 8px;display:flex;align-items:center;gap:10px;}
.subsec-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── ITEMS ── */
.items-list{padding:0 12px;display:flex;flex-direction:column;gap:3px;}
.item-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;}
.item-card::after{content:'';position:absolute;left:0;top:12%;bottom:12%;width:3px;background:transparent;border-radius:0 2px 2px 0;transition:background 0.15s;}
.item-card:hover{border-color:var(--border2);background:var(--surface);}
.item-card.expanded{border-color:var(--brown-border2);background:var(--surface);}
.item-card.expanded::after{background:var(--brown);}
.item-row{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.item-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.veg-dot{width:11px;height:11px;flex-shrink:0;border:1.5px solid var(--green);border-radius:2px;position:relative;}
.veg-dot::after{content:'';position:absolute;top:1.5px;left:1.5px;width:5px;height:5px;background:var(--green);border-radius:50%;}
.item-name{font-size:13.5px;font-weight:400;color:var(--text);line-height:1.3;}
.item-right{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.item-price{font-size:14px;font-weight:600;color:var(--brown);}
.chevron{color:var(--text3);font-size:9px;transition:transform 0.25s;display:inline-block;}
.item-card.expanded .chevron{transform:rotate(180deg);}
.item-desc{font-size:12.5px;color:var(--text2);line-height:1.65;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none;animation:fd 0.2s ease;}
.item-card.expanded .item-desc{display:block;}
@keyframes fd{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.addon-pill{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;color:var(--brown);background:var(--brown-dim);border:1px solid var(--brown-border);border-radius:20px;padding:3px 10px;font-weight:500;}

/* ── FAV HEART ── */
.fav-icon{font-size:15px;cursor:pointer;flex-shrink:0;transition:transform 0.2s,color 0.2s;color:var(--text3);line-height:1;-webkit-tap-highlight-color:transparent;z-index:2;}
.fav-icon:hover{transform:scale(1.2);}
.fav-icon.faved{color:#e74c3c;animation:heartPop 0.3s ease;}
@keyframes heartPop{0%{transform:scale(1);}50%{transform:scale(1.4);}100%{transform:scale(1);}}

/* ── FAVORITES SECTION ── */
.fav-section{background:linear-gradient(135deg,rgba(231,76,60,0.04) 0%,rgba(107,66,38,0.04) 100%);border:1.5px solid rgba(231,76,60,0.15);border-radius:var(--radius);margin:16px 12px 0;padding-bottom:6px;overflow:hidden;}
.fav-section-head{padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.fav-section-head h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:#c0392b;display:flex;align-items:center;gap:8px;}
.fav-section-head .item-count{font-size:11px;color:var(--text3);}
.fav-clear-btn{font-size:10px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:12px;padding:3px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;transition:all 0.2s;}
.fav-clear-btn:hover{border-color:#e74c3c;color:#e74c3c;}
.fav-empty{padding:20px;text-align:center;color:var(--text3);font-size:13px;line-height:1.8;}
.fav-empty span{font-size:26px;display:block;margin-bottom:6px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brown);color:#fff;font-size:12.5px;font-weight:500;padding:10px 20px;border-radius:24px;box-shadow:0 4px 20px rgba(107,66,38,0.3);z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.red{background:#c0392b;}

/* ── SEARCH ── */
.search-result-header{padding:14px 18px 4px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:500;}
.search-result-category{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--brown);opacity:0.8;padding:12px 18px 6px;}
.no-results{padding:50px 20px;text-align:center;color:var(--text3);font-size:13px;line-height:1.8;}
.no-results span{font-size:28px;display:block;margin-bottom:10px;}
mark{background:rgba(107,66,38,0.12);color:var(--brown);border-radius:3px;padding:0 2px;}

/* ── GAPS ── */
.gap{height:14px;}
.gap-lg{height:20px;}

/* ── FOOTER ── */
footer{text-align:center;padding:28px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);font-weight:300;background:#fff;}
footer strong{color:var(--brown);font-weight:500;}

/* ── MOBILE ── */
.swipe-hint{font-size:11px;font-weight:500;letter-spacing:0.4px;text-align:center;padding:6px 16px 4px;display:none;color:var(--brown);background:linear-gradient(90deg,transparent,rgba(107,66,38,0.07),transparent);border-top:1px solid var(--border);animation:swipePulse 2.5s ease-in-out infinite;}
.swipe-hint::before{content:'⟵ ';}
.swipe-hint::after{content:' ⟶';}
@keyframes swipePulse{0%,100%{opacity:0.6;}50%{opacity:1;}}
@media(max-width:600px){.swipe-hint{display:block;}.item-name{font-size:13px;}}
@media(max-width:400px){.header h1{letter-spacing:1px;}.items-list{padding:0 8px;}.item-card{padding:12px 12px;}}

.best-icon{margin-left:8px;font-size:10px;font-weight:600;color:#6b4226;background:rgba(107,66,38,0.08);padding:2px 6px;border-radius:10px;}
.must-icon{margin-left:8px;font-size:11px;font-weight:600;color:#c2410c;background:rgba(194,65,12,0.08);padding:2px 6px;border-radius:10px;letter-spacing:0.3px;}

/* ══ TODAY'S SPECIAL FAB ══ */
.special-fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:400;display:flex;align-items:center;gap:8px;background:var(--brown);color:#fff;border:none;border-radius:30px;padding:13px 22px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.4px;cursor:pointer;box-shadow:0 4px 20px rgba(107,66,38,0.45),0 2px 8px rgba(107,66,38,0.3);transition:transform 0.2s,box-shadow 0.2s,background 0.2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;animation:fabEntrance 0.5s cubic-bezier(0.34,1.56,0.64,1) both;}
.special-fab:hover{background:var(--brown-mid);transform:translateX(-50%) translateY(-2px);box-shadow:0 8px 28px rgba(107,66,38,0.5),0 3px 10px rgba(107,66,38,0.35);}
.special-fab:active{transform:translateX(-50%) scale(0.96);}
.special-fab-star{font-size:16px;animation:starSpin 3s ease-in-out infinite;}
@keyframes starSpin{0%,100%{transform:rotate(0deg) scale(1);}50%{transform:rotate(15deg) scale(1.15);}}
@keyframes fabEntrance{from{opacity:0;transform:translateX(-50%) translateY(30px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── SPECIAL OVERLAY ── */
.special-overlay{position:fixed;inset:0;background:rgba(42,31,22,0.6);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.special-overlay.open{opacity:1;pointer-events:auto;}
.special-sheet{background:var(--bg-page);width:100%;max-width:600px;max-height:88vh;border-radius:24px 24px 0 0;overflow:hidden;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);box-shadow:0 -8px 40px rgba(107,66,38,0.25);}
.special-overlay.open .special-sheet{transform:translateY(0);}
.special-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.special-header{padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.special-header-left{display:flex;align-items:center;gap:12px;}
.special-header-icon{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--brown) 0%,var(--brown-mid) 100%);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.special-header-text h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--brown);margin-bottom:2px;}
.special-header-text p{font-size:11px;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;}
.special-close{width:32px;height:32px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2);transition:all 0.2s;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.special-close:hover{background:var(--surface2);border-color:var(--border2);}
.special-date-badge{display:flex;align-items:center;gap:8px;padding:10px 20px 8px;flex-shrink:0;}
.special-date-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--brown);background:var(--brown-dim);border:1px solid var(--brown-border);border-radius:20px;padding:4px 12px;letter-spacing:0.3px;}
.special-list{overflow-y:auto;padding:4px 0 20px;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;}
.special-list::-webkit-scrollbar{width:4px;}
.special-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.special-cat-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:12px 20px 6px;display:flex;align-items:center;gap:10px;}
.special-cat-label::after{content:'';flex:1;height:1px;background:var(--border);}
.special-item{margin:0 12px 6px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.special-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--brown),var(--brown-pale));border-radius:0 2px 2px 0;}
.special-item:hover{border-color:var(--border2);background:var(--surface);}
.special-item-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.special-item-left{flex:1;min-width:0;padding-left:4px;}
.special-item-name{font-size:13.5px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.3;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.special-item-desc{font-size:12px;color:var(--text2);line-height:1.55;}
.special-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.special-item-price{font-size:14px;font-weight:700;color:var(--brown);}
.special-badge{font-size:9.5px;font-weight:600;letter-spacing:0.3px;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.badge-today{color:#fff;background:var(--brown);}
.badge-chef{color:#c2410c;background:rgba(194,65,12,0.1);border:1px solid rgba(194,65,12,0.2);}
.badge-limited{color:#6b21a8;background:rgba(107,33,168,0.08);border:1px solid rgba(107,33,168,0.2);}
.special-veg{width:10px;height:10px;flex-shrink:0;border:1.5px solid var(--green);border-radius:2px;position:relative;display:inline-block;vertical-align:middle;margin-right:2px;}

/* ══ MEMBERSHIP HELPERS ══ */
function getMembership() {
  try {
    const m = JSON.parse(localStorage.getItem('kava_membership') || 'null');
    if (!m) return null;
    if (new Date(m.expiresAt) < new Date()) {
      localStorage.removeItem('kava_membership');
      return null;
    }
    return m;
  } catch(e) { return null; }
}
function saveMembership(planId, name, phone) {
  const plan = MEMBERSHIP_PLANS[planId];
  const now = new Date();
  const exp = new Date(now.getTime() + plan.durationDays * 86400000);
  localStorage.setItem('kava_membership', JSON.stringify({
    planId, name, phone,
    planName: plan.name,
    discount: plan.discount,
    freeDrinksPerMonth: plan.freeDrinksPerMonth,
    joinedAt: now.toISOString(),
    expiresAt: exp.toISOString()
  }));
}

/* ══ UPI PAYMENT FLOW ══ */
function buildUPILink(plan) {
  const note = encodeURIComponent('Kava ' + plan.name + ' Membership');
  const name = encodeURIComponent(UPI_CONFIG.payeeName);
  const upiId = encodeURIComponent(UPI_CONFIG.upiId);
  /* Standard UPI deep link — opens PhonePe/GPay/Paytm with amount pre-filled */
  return `upi://pay?pa=${upiId}&pn=${name}&am=${plan.price}&cu=INR&tn=${note}`;
}

function buildPhonePeLink(plan) {
  /* PhonePe specific deep link */
  const note = encodeURIComponent('Kava ' + plan.name + ' Membership');
  return `phonepe://pay?pa=${encodeURIComponent(UPI_CONFIG.upiId)}&pn=${encodeURIComponent(UPI_CONFIG.payeeName)}&am=${plan.price}&cu=INR&tn=${note}`;
}

function triggerUPIPayment() {
  const plan = MEMBERSHIP_PLANS[pendingPayment.planId];
  const upiLink = buildUPILink(plan);
  const btn = document.getElementById('upi-pay-btn');

  /* Change button state */
  btn.innerHTML = `<span class="upi-pay-btn-icon">⏳</span>
    <div class="upi-pay-btn-text">
      <strong>Opening UPI App…</strong>
      <span>Complete payment in your app</span>
    </div>`;
  btn.style.background = 'var(--brown-mid)';
  btn.disabled = true;

  /* Open UPI deep link */
  window.location.href = upiLink;

  /* After a short delay, show the "activate" button in case user returns */
  setTimeout(function() {
    showActivateButton();
    /* Re-enable pay button in case they want to retry */
    if (btn) {
      btn.disabled = false;
      btn.style.background = '';
      btn.innerHTML = `<span class="upi-pay-btn-icon">📱</span>
        <div class="upi-pay-btn-text">
          <strong>Retry Payment</strong>
          <span>Opens your payment app again</span>
        </div>
        <span class="upi-pay-btn-arrow">→</span>`;
    }
  }, 2500);
}

function showActivateButton() {
  const activateBtn = document.getElementById('upi-activate-btn');
  const confirmBox = document.getElementById('upi-paid-confirm');
  if (activateBtn) activateBtn.classList.add('visible');
  if (confirmBox) confirmBox.classList.add('visible');
}

function activateMembership() {
  if (!pendingPayment) return;
  const btn = document.getElementById('upi-activate-btn');
  btn.innerHTML = '<span class="upi-activate-btn-icon">⏳</span> Activating…';
  btn.disabled = true;
  setTimeout(function() {
    saveMembership(pendingPayment.planId, pendingPayment.name, pendingPayment.phone);
    showMembershipSuccess(pendingPayment.name, pendingPayment.planId);
    pendingPayment = null;
    buildNav();
    render();
  }, 900);
}

      <div class="ms-active-perk-row">${plan.freeDrinksPerMonth} free drink${plan.freeDrinksPerMonth>1?'s':''} per month — ask your barista</div>
      ${m.planId==='reserve'?'<div class="ms-active-perk-row">1 complimentary food item per month</div>':''}
      ${m.planId==='reserve'?'<div class="ms-active-perk-row">Gold priority at counter — walk up and mention your membership</div>':''}
    </div>
    <button class="ms-cancel-btn" onclick="cancelMembership()">Cancel membership</button>`;
}

function cancelMembership() {
  if (!confirm('Cancel your Kava membership? Your perks stay active until expiry.')) return;
  localStorage.removeItem('kava_membership');
  closeMembership();
  buildNav();
  render();
  showToast('Membership cancelled');
}

function memberCardHTML() {
  const m = getMembership();
  if (!m) {
    return `<div class="member-card promo" onclick="openMembership()">
      <div class="member-card-top">
        <div class="member-card-brand">Kava Caffeine House</div>
        <div style="font-size:10px;opacity:0.65;">Tap to join →</div>
      </div>
      <div class="member-card-name">Become a Member</div>
      <div class="member-card-sub">Unlock discounts, free drinks & exclusive perks</div>
      <div class="member-perks-row">
        <div class="member-perk-chip">10–20% off</div>
        <div class="member-perk-chip">Free drinks</div>
        <div class="member-perk-chip">Priority access</div>
      </div>
    </div>`;
  }
  const plan = MEMBERSHIP_PLANS[m.planId];
  const exp = new Date(m.expiresAt);
  const daysLeft = Math.ceil((exp - new Date()) / 86400000);
  const isGold = m.planId === 'reserve';
  return `<div class="member-card ${m.planId}" onclick="openMembership()">
    <div class="member-card-top">
      <div class="member-card-brand">Kava Caffeine House</div>
      <div class="member-verified-badge ${isGold?'gold-badge':''}">${isGold?'★ Gold Member':'✓ Member'}</div>
    </div>
    <div class="member-card-name">${m.planName}</div>
    <div class="member-card-sub">${m.name} · ${daysLeft} day${daysLeft!==1?'s':''} left</div>
    <div class="member-perks-row">
      <div class="member-perk-chip">${plan.discount}% off drinks</div>
      <div class="member-perk-chip">${plan.freeDrinksPerMonth} free/month</div>
      ${isGold?'<div class="member-perk-chip">Gold priority</div>':''}
    </div>
    <div class="member-expiry">Tap to view full benefits & details</div>
  </div>`;
}

/* ══ SPECIALS ══ */
function findItem(sectionKey, itemName) {
  const sec = MENU[sectionKey];
  if (!sec) return null;
  const needle = itemName.trim().toLowerCase();
  for (const items of Object.values(sec.subsections)) {
    const found = items.find(i => i.name.trim().toLowerCase() === needle);
    if (found) return {...found, sectionLabel:sec.label, sectionEmoji:sec.emoji};
  }
  return null;
}

function openSpecial() {
  const overlay = document.getElementById('specialOverlay');
  const list = document.getElementById('specialList');
  const datePill = document.getElementById('specialDatePill');
  const now = new Date();
  datePill.innerHTML = `📅 ${now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}`;
  const grouped = {};
  TODAYS_SPECIALS.forEach(sp => {
    const found = findItem(sp.section, sp.name);
    const sec = MENU[sp.section];
    if (!sec) return;
    const item = found
      ? {...found}
      : {name:sp.name,price:sp.price||'—',desc:sp.desc||'',tag:'',addon:'',sectionLabel:sec.label,sectionEmoji:sec.emoji};
    if (!grouped[sp.section]) grouped[sp.section] = {label:item.sectionLabel,emoji:item.sectionEmoji,items:[]};
    grouped[sp.section].items.push({...item,specialBadge:sp.specialBadge,note:sp.note||sp.desc||item.desc});
  });
  let html = '';
  Object.values(grouped).forEach(group => {
    html += `<div class="special-cat-label">${group.emoji} ${group.label}</div>`;
    group.items.forEach(item => {
      const badgeLabel = item.specialBadge==='chef'?"✦ Chef's Pick":item.specialBadge==='limited'?'⏳ Limited':'★ Today Only';
      const badgeClass = item.specialBadge==='chef'?'badge-chef':item.specialBadge==='limited'?'badge-limited':'badge-today';
      const tagBadge = item.tag==='bestseller'?'<span class="best-icon">⭐ Bestseller</span>':item.tag==='musttry'?'<span class="must-icon">🔥 MustTry</span>':'';
      html += `<div class="special-item">
        <div class="special-item-row">
          <div class="special-item-left">
            <div class="special-item-name"><span class="special-veg"></span>${item.name}${tagBadge}</div>
            <div class="special-item-desc">${item.note||item.desc}</div>
            ${item.addon?`<div class="addon-pill" style="margin-top:6px;">✦ ${item.addon}</div>`:''}
          </div>
          <div class="special-item-right">
            <span class="special-item-price">₹${item.price}</span>
            <span class="special-badge ${badgeClass}">${badgeLabel}</span>
          </div>
        </div>
      </div>`;
    });
  });
  list.innerHTML = html;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSpecial() {
  document.getElementById('specialOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('specialOverlay')) closeSpecial();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeSpecial(); closeMembership(); } });

/* ══ STATE ══ */
let currentSection = 'coffee';
let searchQuery = '';
let expanded = new Set();

/* ══ FAVOURITES ══ */
function getFavs() {
  try { return JSON.parse(localStorage.getItem('kava_favs') || '[]'); } catch(e) { return []; }
}
function saveFavs(arr) { localStorage.setItem('kava_favs', JSON.stringify(arr)); }
function isFaved(name) { return getFavs().some(f => f.name === name); }

function toggleFav(e, itemName, itemPrice, itemDesc, itemTag, itemAddon) {
  e.stopPropagation();
  let favs = getFavs();
  const idx = favs.findIndex(f => f.name === itemName);
  if (idx >= 0) {
    favs.splice(idx, 1);
    saveFavs(favs);
    showToast('Removed from favourites', true);
  } else {
    favs.push({name:itemName,price:itemPrice,desc:itemDesc,tag:itemTag||'',addon:itemAddon||''});
    saveFavs(favs);
    showToast('❤️ Added to favourites!');
  }
  document.querySelectorAll(`.fav-icon[data-name="${CSS.escape(itemName)}"]`).forEach(el => {
    el.classList.toggle('faved', isFaved(itemName));
    el.textContent = isFaved(itemName) ? '❤️' : '♡';
  });
  updateFavBadge();
  updateFavBanner();
  if (currentSection === 'favorites') render();
}

function clearAllFavs() {
  saveFavs([]);
  updateFavBadge();
  updateFavBanner();
  render();
  showToast('Favourites cleared');
}
function updateFavBadge() {
  const count = getFavs().length;
  const badge = document.getElementById('fav-badge');
  if (badge) { badge.textContent = count; badge.style.display = count > 0 ? 'inline-flex' : 'none'; }
}
function updateFavBanner() {
  const banner = document.getElementById('fav-quick-banner');
  if (!banner) return;
  const count = getFavs().length;
  const subEl = banner.querySelector('.fav-banner-sub');
  if (subEl) subEl.innerHTML = count > 0 ? `<strong>${count} item${count!==1?'s':''} saved</strong> — tap to view your list` : 'Tap ♡ on any item to save your picks';
}

let toastTimer;
function showToast(msg, isRed) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isRed ? ' red' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2200);
}

/* ══ NAV ══ */
function buildNav() {
  const favCount = getFavs().length;
  const m = getMembership();
  const memBtn = `<button class="member-nav-btn${m?' active-member':''}" onclick="openMembership()">
    <span class="n-emoji">${m?'★':'☕'}</span>${m?'My Card':'Join'}
  </button>`;
  const favBtn = `<button class="nav-btn fav-nav-btn${currentSection==='favorites'?' active':''}" onclick="setSection('favorites')">
    <span class="n-emoji">❤️</span>Favourites
    <span class="fav-badge" id="fav-badge" style="display:${favCount>0?'inline-flex':'none'}">${favCount}</span>
  </button>`;
  document.getElementById('navScroll').innerHTML =
    memBtn + favBtn +
    Object.entries(MENU).map(([k,v]) =>
      `<button class="nav-btn${k===currentSection?' active':''}" onclick="setSection('${k}')"><span class="n-emoji">${v.emoji}</span>${v.label}</button>`
    ).join('');
}

function setSection(key) {
  currentSection = key;
  if (searchQuery) { clearSearch(); return; }
  expanded = new Set();
  buildNav();
  render();
  window.scrollTo({top:document.querySelector('.sticky-top').offsetHeight,behavior:'smooth'});
}

function handleSearch(val) {
  searchQuery = val.toLowerCase().trim();
  document.getElementById('clearBtn').style.display = searchQuery ? 'flex' : 'none';
  expanded = new Set();
  render();
}
function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  expanded = new Set();
  render();
}
function toggle(id) {
  expanded.has(id) ? expanded.delete(id) : expanded.add(id);
  const card = document.getElementById(id);
  if (!card) return;
  card.classList.toggle('expanded', expanded.has(id));
}
function hl(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>');
}

function itemHTML(item, id) {
  const isExp = expanded.has(id);
  const q = searchQuery;
  const faved = isFaved(item.name);
  const m = getMembership();
  const discountTag = m ? `<span class="member-discount-tag">${m.discount}% off</span>` : '';
  return `<div class="item-card${isExp?' expanded':''}" id="${id}" onclick="toggle('${id}')">
    <div class="item-row">
      <div class="item-left">
        <span class="veg-dot"></span>
        <span class="fav-icon${faved?' faved':''}" data-name="${item.name.replace(/"/g,'&quot;')}"
          onclick="toggleFav(event,'${item.name.replace(/'/g,"\\'")}',${item.price},'${(item.desc||'').replace(/'/g,"\\'")}','${item.tag||''}','${(item.addon||'').replace(/'/g,"\\'")}')"
        >${faved?'❤️':'♡'}</span>
        <span class="item-name">
          ${hl(item.name,q)}
          ${item.tag==='bestseller'?'<span class="best-icon">⭐ Bestseller</span>':''}
          ${item.tag==='musttry'?'<span class="must-icon">🔥 MustTry</span>':''}
          ${discountTag}
        </span>
      </div>
      <div class="item-right"><span class="item-price">₹${item.price}</span><span class="chevron">▾</span></div>
    </div>
    <div class="item-desc">
      ${hl(item.desc,q)}
      ${item.addon?`<div class="addon-pill">✦ ${item.addon}</div>`:''}
    </div>
  </div>`;
}

function favBannerHTML() {
  const count = getFavs().length;
  const subText = count > 0
    ? `<strong>${count} item${count!==1?'s':''} saved</strong> — tap to view your list`
    : 'Tap ♡ on any item to save your picks';
  return `<div class="fav-quick-banner" id="fav-quick-banner" onclick="setSection('favorites')">
    <div class="fav-quick-banner-left">
      <div class="fav-quick-banner-icon">❤️</div>
      <div class="fav-quick-banner-text">
        <h3>Your Favourites</h3>
        <p class="fav-banner-sub">${subText}</p>
      </div>
    </div>
    <div class="fav-quick-banner-arrow">›</div>
  </div>`;
}

/* ══ RENDER ══ */
function render() {
  const c = document.getElementById('content');

  if (currentSection === 'favorites' && !searchQuery) {
    const favs = getFavs();
    if (!favs.length) {
      c.innerHTML = `<div class="gap-lg"></div>
        <div class="fav-section" style="margin:16px 12px;">
          <div class="fav-section-head"><h2>❤️ Your Favourites</h2></div>
          <div class="fav-empty"><span>🫶</span>Tap ♡ on any item to save it here.<br><small style="color:var(--text3)">Your wishlist lives across visits!</small></div>
        </div>`;
      return;
    }
    c.innerHTML = `<div class="gap-lg"></div>
      <div class="fav-section">
        <div class="fav-section-head">
          <h2>❤️ Your Favourites</h2>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="item-count">${favs.length} item${favs.length!==1?'s':''}</span>
            <button class="fav-clear-btn" onclick="clearAllFavs()">Clear all</button>
          </div>
        </div>
        <div class="items-list" style="padding:0 10px;">
          ${favs.map((item,i) => itemHTML(item,`fav-${i}`)).join('')}
        </div>
        <div class="gap"></div>
      </div>`;
    return;
  }

  if (searchQuery) {
    let html = `<div class="search-result-header">Results for "${searchQuery}"</div>`;
    let found = 0;
    Object.entries(MENU).forEach(([sk,sv]) => {
      let secItems = '';
      Object.entries(sv.subsections).forEach(([sub,items]) => {
        items.forEach((item,i) => {
          if (item.name.toLowerCase().includes(searchQuery) || item.desc.toLowerCase().includes(searchQuery)) {
            secItems += itemHTML(item,`s-${sk}-${i}-${sub.replace(/\W/g,'')}`);
            found++;
          }
        });
      });
      if (secItems) html += `<div class="search-result-category">${sv.emoji} ${sv.label}</div><div class="items-list">${secItems}</div><div class="gap"></div>`;
    });
    if (!found) html = `<div class="no-results"><span>🔍</span>Nothing found for "<strong>${searchQuery}</strong>"<br><small style="color:var(--text3)">Try a different keyword</small></div>`;
    c.innerHTML = html;
    return;
  }

  const sec = MENU[currentSection];
  const total = Object.values(sec.subsections).reduce((a,b) => a+b.length, 0);
  let html = `<div class="gap-lg"></div>`;
  html += memberCardHTML();
  html += favBannerHTML();
  html += `<div class="section-head"><h2>${sec.emoji} ${sec.label}</h2><span class="item-count">${total} items</span></div>`;
  const subs = Object.entries(sec.subsections);
  subs.forEach(([sub,items]) => {
    if (subs.length > 1) html += `<div class="subsec-label">${sub}</div>`;
    html += `<div class="items-list">`;
    items.forEach((item,i) => { html += itemHTML(item,`${currentSection}-${sub.replace(/\W/g,'')}-${i}`); });
    html += `</div><div class="gap"></div>`;
  });
  c.innerHTML = html;
}

buildNav();
render();
</script>
</body>
</html>
